spring.application.name=MicroServicioUbicacion
server.port=8088

# ── CONEXIÓN MYSQL ──────────────────────────────────
# Crea la BD vacía en phpMyAdmin antes de arrancar.
# Hibernate generará las tablas desde las entidades.
spring.datasource.url=jdbc:mysql://localhost:3306/bd_petpals
spring.datasource.username=root
spring.datasource.password=

# ── DDL AUTO ────────────────────────────────────────
# update: crea las tablas si no existen, las actualiza
# si el modelo cambió. Ideal para desarrollo en clase.
spring.jpa.hibernate.ddl-auto=update

# ── MOSTRAR SQL ─────────────────────────────────────
# Muestra en consola el SQL que ejecuta Hibernate.
# Útil para entender qué ocurre internamente.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── CONFIGURACIÓN DE EUREKA CLIENT ──────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── PORTALES DE MICROSERVICIOS CONECTADOS ───────────
cuidador-service.url=http://localhost:8085/api/cuidadores

# ── CONFIGURACIÓN DE SWAGGER ─────
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html