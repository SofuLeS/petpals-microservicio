spring.application.name=ms-cuidadores
server.port=8085

# --- CONFIGURACIÓN UNIVERSAL (WINDOWS/LINUX - MYSQL/MARIADB) ---
# Usamos 127.0.0.1 para evitar líos de sockets en Linux y Windows
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bd_petpals?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false

# Credenciales estándar de XAMPP/MariaDB por defecto
spring.datasource.username=root
spring.datasource.password=

# Usamos el driver de MySQL (MariaDB es compatible con él)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PUNTO MEDIO: No fuerces un dialecto específico.
# Si borras la línea de 'hibernate.dialect', Hibernate detectará automáticamente
# si está en MariaDB o MySQL y se adaptará solo.
# spring.jpa.properties.hibernate.dialect= <--- BORRADA PARA COMPATIBILIDAD

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect