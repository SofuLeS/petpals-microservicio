spring.application.name=ms-pago
server.port=8087

ms.reservas.url=http://localhost:8086
ms.cuidadores.url=http://localhost:8085

spring.main.web-application-type=servlet

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bd_petpals?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true