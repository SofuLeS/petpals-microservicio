# ── CONFIGURACIÓN BÁSICA DEL SERVICIO ────────────────
spring.application.name=ms-resenas
server.port=8085
spring.profiles.active=dev

# ── CONEXIÓN MYSQL ÚNICA ─────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/bd_petpals
spring.datasource.username=root
spring.datasource.password=

# ── DDL AUTO Y LOGS SQL ─────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── CONFIGURACIÓN DE SWAGGER (OPENAPI) ──────────────
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# ── CONFIGURACIÓN DE EUREKA CLIENT ──────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── URLS DE MICROSERVICIOS CONECTADOS (OBLIGATORIOS PARA WEBCLIENT) ──
# Con esto tu clase Data sabrá exactamente a dónde ir a preguntar
dueno-service.url=http://localhost:8084/api/duenos
cuidador-service.url=http://localhost:8085/api/cuidadores