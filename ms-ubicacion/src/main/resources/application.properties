spring.application.name=ms-
server.port=8088

# ── CONEXIÓN MYSQL ──────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/bd_petpals
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── DDL AUTO ────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update

# ── MOSTRAR SQL ─────────────────────────────────────
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── CONFIGURACIÓN DE EUREKA CLIENT ──────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── PORTALES DE MICROSERVICIOS CONECTADOS ───────────
cuidador-service.url=http://localhost:8085/api/cuidadores

# ── CONFIGURACIÓN DE SWAGGER ────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/doc/swagger-ui.html